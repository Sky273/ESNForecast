services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: esn_forecast
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "55432:5432"
    volumes:
      - esn_forecast_pg:/var/lib/postgresql/data

volumes:
  esn_forecast_pg:
